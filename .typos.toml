[default]
# Allow French words in documentation and code comments
# This project uses French for documentation and some code comments

# Use regex to allow French words
extend-ignore-words-re = [
    "[a-z횪창채챕챔챗챘챦챤척철첫청체첼챌]+$",  # Basic French word pattern
]

[files]
extend-exclude = [
    "*.fr.md",
    "README.fr.md",
    "CHANGELOG.fr.md",
    "SECURITY.fr.md",
    "archive/README.md",
]
