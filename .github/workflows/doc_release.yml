name: Release
on:
  push:
    branches: [master] # Changé de main vers master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Assurez-vous que RELEASE_TOKEN est un PAT avec le scope 'workflow'
          token: ${{ secrets.GH_TOKEN }} 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-semantic-release uv

      - name: Get version and update docs
        id: version
        run: |
            VERSION=$(python -m semantic_release version --print)
            DATE=$(date +%Y-%m-%d)
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            # ASTUCE : On utilise [V]ERSION dans la regex pour que 
            # ce fichier YAML ne corresponde pas à sa propre recherche.
            
            # 1. Update docs folder (uniquement les .md)
            find docs/ -name "*.md" -exec sed -i \
                -e "s/\*\*Version\*\*: [0-9.]* | Last updated: .*/**Version**: $VERSION | Last updated: $DATE/g" \
                -e "s/taskiq-flow=={[V]ERSION}/taskiq-flow==$VERSION/g" {} \;
    
            # 2. Update root README
            sed -i \
                -e "s/\*\*Version\*\*: [0-9.]* | Last updated: .*/**Version**: $VERSION | Last updated: $DATE/g" \
                -e "s/taskiq-flow=={[V]ERSION}/taskiq-flow==$VERSION/g" README.md

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Nettoyage préventif pour ne pas inclure de fichiers systèmes ou workflows
          git reset
          
          # On ajoute strictement les fichiers de documentation
          git add README.md
          if [ -d "docs" ]; then git add docs/*.md; fi
          
          # Sécurité : on vérifie si le workflow a été modifié malgré tout
          if git diff --cached --name-only | grep ".github/workflows/"; then
            echo "ERREUR : Le workflow a été modifié par le script. Annulation pour éviter le blocage."
            git checkout .github/workflows/
            exit 1
          fi

          git commit -m "docs: update version to ${{ steps.version.outputs.version }}" || echo "No changes"
          
          # On force le push vers master
          git push origin master
