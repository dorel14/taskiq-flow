name: Release
on:
  push:
    branches: [master] # Se déclenche quand la PR est mergée dans main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # CRUCIAL : C'est ici qu'on force l'utilisation de TON token
          # Remplace RELEASE_TOKEN par le nom exact de ton secret
          token: ${{ secrets.GH_TOKEN }} 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-semantic-release uv

      - name: Get version and update docs
        id: version
        run: |
            VERSION=$(python -m semantic_release version --print)
            DATE=$(date +%Y-%m-%d)
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            # On limite strictement aux fichiers README.md pour éviter de toucher au YAML
            # On utilise une regex plus sûre pour éviter les boucles
            
            find docs/ -name "README.md" -exec sed -i \
                -e "s/\*\*Version\*\*: [0-9.]* | Last updated: .*/**Version**: $VERSION | Last updated: $DATE/g" \
                -e "s/taskiq-flow=={[^}]*}/taskiq-flow==$VERSION/g" {} \;
    
            sed -i \
                -e "s/\*\*Version\*\*: [0-9.]* | Last updated: .*/**Version**: $VERSION | Last updated: $DATE/g" \
                -e "s/taskiq-flow=={[^}]*}/taskiq-flow==$VERSION/g" README.md

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # On reset pour être sûr de ne pas avoir de fichiers fantômes
          git reset
          
          # On ajoute seulement ce qui nous intéresse
          git add README.md docs/*.md
          
          # On vérifie si un workflow s'est glissé là par erreur
          if git diff --cached --name-only | grep ".github/workflows/"; then
            echo "Alerte : Tentative de modification de workflow détectée !"
            git checkout .github/workflows/ # On annule la modif du workflow
          fi

          git commit -m "docs: update version to ${{ steps.version.outputs.version }}" || echo "No changes"
          
          # On pousse vers main explicitement si c'est là qu'on veut la doc à jour
          git push origin master
