name: Release
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # On garde workflows: write au cas où, mais on va surtout éviter de le modifier
      workflows: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Important : Si vous utilisez un PAT, remplacez la ligne ci-dessous
          # token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install python-semantic-release uv

      - name: Get version and update docs
        id: version
        run: |
            # On récupère la version sans modifier de fichiers (mode print)
            VERSION=$(python -m semantic_release version --print)
            DATE=$(date +%Y-%m-%d)
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            # Mise à jour des README dans /docs/
            find docs/ -name "README.md" -exec sed -i \
                -e "s/\*\*Version\*\*: [0-9.]* | Last updated: .*/**Version**: $VERSION | Last updated: $DATE/g" \
                -e "s/taskiq-flow=={[^}]*}/taskiq-flow==$VERSION/g" {} \;
    
            # Mise à jour du README à la racine
            sed -i \
                -e "s/\*\*Version\*\*: [0-9.]* | Last updated: .*/**Version**: $VERSION | Last updated: $DATE/g" \
                -e "s/taskiq-flow=={[^}]*}/taskiq-flow==$VERSION/g" README.md

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. On annule tout marquage de fichier (reset)
          git reset
          
          # 2. On ajoute UNIQUEMENT les fichiers de doc et le README racine
          git add docs/ README.md
          
          # 3. On vérifie si on a accidentellement ajouté un workflow (sécurité)
          if git diff --cached --name-only | grep -E ".github/workflows/"; then
            echo "ERREUR : Un fichier de workflow a été détecté dans le commit. Annulation."
            exit 1
          fi

          # 4. On commit et on push
          git commit -m "docs: update version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin HEAD
