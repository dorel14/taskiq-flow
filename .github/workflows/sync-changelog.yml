name: Sync Changelogs
on:
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync to French changelog (stub - manual translation needed)
        run: |
          echo "<!-- CHANGELOG FRANÇAIS - À traduire manuellement -->" > CHANGELOG.fr.md.new
          echo "" >> CHANGELOG.fr.md.new
          grep -A 100 "^## " CHANGELOG.md >> CHANGELOG.fr.md.new || true
          cp CHANGELOG.fr.md.new CHANGELOG.fr.md