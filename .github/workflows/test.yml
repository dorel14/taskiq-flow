name: Testing taskiq-flow

on: pull_request

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: 3.14
          version: "latest"
          python-version: 3.14
      - name: Install deps
        run: uv sync --frozen --all-extras
      - name: Run pre-commit and auto-fix
        run: |
          set +e
          uv run pre-commit run --all-files 2>&1 | tee precommit.log
          first_status=${PIPESTATUS[0]}
          set -e
          if [ $first_status -eq 0 ]; then
            echo "Pre-commit passed, no fixes needed."
          else
            if ! git diff --quiet; then
              echo "Pre-commit applied automatic fixes. Verifying..."
              uv run pre-commit run --all-files
              second_status=$?
              if [ $second_status -eq 0 ]; then
                git config user.email "action@github.com"
                git config user.name "github-actions[bot]"
                git add -A
                git commit -m "chore: apply pre-commit fixes"
                git push origin HEAD:${{ github.head_ref }}
              else
                echo "Pre-commit still failing after fixes."
                exit $second_status
              fi
            else
              echo "Pre-commit failed without automatic fixes."
              exit $first_status
            fi
          fi
  pytest:
    strategy:
      matrix:
        py_version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        pydantic_ver: [ "<2", ">=2.5,<3" ]
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: "${{ matrix.os }}"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.py_version }}
          version: "latest"
          python-version: ${{ matrix.py_version }}
      - name: Install deps
        run: uv sync --frozen --all-extras
      - name: Setup pydantic version
        run: uv pip install "pydantic ${{ matrix.pydantic_ver }}"
      - name: Run pytest check
        run: uv run pytest -vv -n auto .
